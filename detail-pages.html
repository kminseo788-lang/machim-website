<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상세페이지 포트폴리오 — 마침.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1A4731;
    --green-pale: #e0ece5;
    --gray: #EDE9E1;
    --white: #FFFFFF;
    --border: #DDD8CE;
    --text: #1C1C1A;
    --muted: #888;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--gray);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .bar-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--green); font-weight: 600;
  }
  .bar-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .tabs { display: flex; gap: 8px; }
  .tab-btn {
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--muted);
    font-size: 13px; font-weight: 600;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--green); }
  .tab-btn.active {
    background: var(--green);
    color: var(--white);
    border-color: var(--green);
  }

  .frame-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  iframe.active { display: block; }

  @media (max-width: 600px) {
    .bar { padding: 12px 16px; }
    .bar-label { font-size: 11px; }
    .tab-btn { font-size: 12px; padding: 7px 12px; }
  }
</style>
</head>
<body>

<div class="bar">
  <div class="bar-label"><span class="bar-dot"></span>Portfolio · 상세페이지</div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-sunscreen" onclick="switchTab('sunscreen')">Pure UV Sun Essence · 뷰티</button>
    <button class="tab-btn" id="tab-food" onclick="switchTab('food')">음식물 처리기 · 가전</button>
  </div>
</div>

<div class="frame-wrap">
  <iframe id="frame-sunscreen" class="active" src="sunscreen.html"></iframe>
  <iframe id="frame-food" src="food.html"></iframe>
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('frame-' + name).classList.add('active');
}
</script>

</body>
</html>
