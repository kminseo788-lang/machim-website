<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>마침 · 비밀번호 재설정</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green: #1B4332;
    --cream: #F5F2ED;
    --text: #2B2B28;
    --muted: #8A8578;
    --border: #E3DED3;
    --error: #B3261E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
  }
  h1 { font-size: 19px; color: var(--green); margin: 0 0 6px; }
  p.sub { font-size: 13px; color: var(--muted); margin: 0 0 26px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
  }
  input:focus { outline: 2px solid var(--green); outline-offset: 1px; }
  button {
    width: 100%; margin-top: 22px; padding: 13px; background: var(--green);
    color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .msg { font-size: 13px; margin-top: 14px; text-align: center; line-height: 1.6; }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--green); font-weight: 600; }
  .state { text-align: center; padding: 20px 0; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div class="card">
  <h1>마침 관리자</h1>
  <p class="sub">새 비밀번호를 설정해주세요.</p>

  <div id="loadingState" class="state">확인 중...</div>

  <div id="formState" style="display:none;">
    <label for="newPassword">새 비밀번호</label>
    <input type="password" id="newPassword" placeholder="6자 이상 입력해주세요" autocomplete="new-password">
    <label for="confirmPassword">새 비밀번호 확인</label>
    <input type="password" id="confirmPassword" placeholder="다시 한번 입력해주세요" autocomplete="new-password">
    <button id="submitBtn">비밀번호 변경</button>
    <p class="msg error" id="errorMsg" style="display:none;"></p>
  </div>

  <div id="successState" style="display:none;">
    <p class="msg success">비밀번호가 변경되었어요.<br>이제 admin.html에서 새 비밀번호로 로그인하실 수 있어요.</p>
  </div>

  <div id="invalidState" style="display:none;">
    <p class="msg error">링크가 만료되었거나 올바르지 않아요.<br>Supabase에서 재설정 메일을 다시 요청해주세요.</p>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://jzxlmcvthicmruxxxmzg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6eGxtY3Z0aGljbXJ1eHh4bXpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjM2MDgsImV4cCI6MjA5ODc5OTYwOH0.ld7qDDJgqK1cQzf1IoCiyglFFQeMRArmWPoavR4bPo8";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingState = document.getElementById('loadingState');
  const formState = document.getElementById('formState');
  const successState = document.getElementById('successState');
  const invalidState = document.getElementById('invalidState');

  let recoveryReady = false;

  // Supabase가 재설정 링크의 토큰을 자동으로 인식하고 이 이벤트를 발생시켜요
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
      loadingState.style.display = 'none';
      formState.style.display = 'block';
    }
  });

  // 혹시 이벤트가 늦게 오는 경우를 대비해, 잠시 후에도 세션 확인
  setTimeout(async () => {
    if (recoveryReady) return;
    const { data } = await sb.auth.getSession();
    if (data.session) {
      recoveryReady = true;
      loadingState.style.display = 'none';
      formState.style.display = 'block';
    } else {
      loadingState.style.display = 'none';
      invalidState.style.display = 'block';
    }
  }, 2500);

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.style.display = 'none';

    const pw1 = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('confirmPassword').value;

    if (pw1.length < 6) {
      errorMsg.textContent = '비밀번호는 6자 이상이어야 해요.';
      errorMsg.style.display = 'block';
      return;
    }
    if (pw1 !== pw2) {
      errorMsg.textContent = '비밀번호가 서로 일치하지 않아요.';
      errorMsg.style.display = 'block';
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '변경 중...';

    const { error } = await sb.auth.updateUser({ password: pw1 });

    if (error) {
      errorMsg.textContent = '오류가 발생했어요: ' + error.message;
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '비밀번호 변경';
      return;
    }

    formState.style.display = 'none';
    successState.style.display = 'block';
  });
</script>

</body>
</html>
